<!DOCTYPE html>
<html data-bs-theme="dark">
<head>
    <title>Change Password - Gym Heracles</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body { 
            background-color: #111111; 
            background-image: url('/static/creation-bg.jpg');
            background-size: cover;
            background-position: center;
            background-blend-mode: overlay;
            height: 100vh;
            overflow: hidden;
            font-family: 'Cinzel', serif;
            color: #ffffff;
        }

        /* --- THE GREEK PILLARS --- */
        .pillar {
            position: fixed;
            top: 0;
            bottom: 0;
            width: 12vw; 
            max-width: 130px;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/74/Ionic_column.svg');
            background-size: contain;
            background-repeat: repeat-y;
            background-position: center top;
            z-index: 0; 
            opacity: 0.25; 
            pointer-events: none; 
        }
        .pillar-left { left: 10px; }
        .pillar-right { right: 10px; transform: scaleX(-1); }

        /* Form Container */
        .auth-card {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.75); /* Dark translucent glass effect */
            border: 1px solid #333;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .form-control {
            background-color: rgba(0,0,0,0.5) !important;
            border-color: #555;
            color: white !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; /* Clean font for password dots */
            padding: 12px;
        }
        .form-control:focus {
            border-color: #d3d3d3;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .btn-heracles {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 12px;
            border-radius: 4px;
            background-color: transparent;
            border: 1px solid #ffffff;
            color: #ffffff;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .btn-heracles:hover {
            background-color: #ffffff;
            color: #000000;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }
        
        .back-link {
            text-decoration: none;
            color: #888;
            transition: color 0.2s;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        .back-link:hover {
            color: #fff;
        }
        
        /* Alert Styling */
        .alert {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="pillar pillar-left"></div>
    <div class="pillar pillar-right"></div>

    <div class="container h-100 d-flex justify-content-center align-items-center">
        <div class="auth-card">
            <h2 class="text-center fw-bold mb-4 text-uppercase" style="letter-spacing: 2px;">Change Password</h2>

            {% if error %}
                <div class="alert alert-danger bg-transparent border-danger text-danger text-center" role="alert">
                    {{ error }}
                </div>
            {% endif %}
            
            {% if success %}
                <div class="alert alert-success bg-transparent border-success text-success text-center" role="alert">
                    {{ success }}
                </div>
            {% endif %}

            <form method="POST" action="/change-password">
                <div class="mb-3">
                    <label for="current_password" class="form-label text-uppercase" style="font-size: 0.85rem; letter-spacing: 1px;">Current Password</label>
                    <input type="password" class="form-control" id="current_password" name="current_password" required>
                </div>
                <div class="mb-3">
                    <label for="new_password" class="form-label text-uppercase" style="font-size: 0.85rem; letter-spacing: 1px;">New Password</label>
                    <input type="password" class="form-control" id="new_password" name="new_password" required minlength="6">
                </div>
                <div class="mb-4">
                    <label for="confirm_password" class="form-label text-uppercase" style="font-size: 0.85rem; letter-spacing: 1px;">Confirm New Password</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" required minlength="6">
                </div>
                <button type="submit" class="btn btn-heracles w-100">Update Password</button>
            </form>

            <div class="text-center mt-4">
                <a href="/" class="back-link text-uppercase">&larr; Return to Dashboard</a>
            </div>
        </div>
    </div>

</body>
</html>
