<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Gym Heracles</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🏋️ Gym Heracles</a>
            <div class="d-flex text-white align-items-center">
                <span class="me-3">Logged in as: <strong>{{ user }}</strong></span>
                <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-dark">Member Dashboard</h2>
        </div>

        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-primary text-white fw-bold py-3">
                        📋 My Active Subscription
                    </div>
                    <div class="card-body p-4">
                        <p class="text-muted mb-0">No active plans found. Please contact an Administrator to assign a membership plan to your account.</p>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-success text-white fw-bold py-3">
                        ⏱️ Recent Attendance
                    </div>
                    <div class="card-body p-4">
                        <p class="text-muted mb-0">You have no recent check-ins.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
