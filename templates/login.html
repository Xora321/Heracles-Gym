<!DOCTYPE html>
<html data-bs-theme="dark">
<head>
    <title>Login - Gym Heracles</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #111111;
            background-image: url('/static/creation-bg.jpg');
            background-size: cover;
            background-position: center;
            background-blend-mode: overlay;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', serif;
        }
        .auth-card {
            background-color: rgba(17, 17, 17, 0.85);
            backdrop-filter: blur(5px);
            border: 1px solid #444;
            width: 100%;
            max-width: 400px;
        }
        .form-control { font-family: -apple-system, sans-serif; }
    </style>
</head>
<body>

    <div class="card auth-card p-4 shadow-lg text-white">
        <div class="card-body text-center">
            
            <h2 class="fw-bold mb-1">Gym Heracles</h2>
            <p class="text-secondary mb-4 small tracking-widest text-uppercase">Enter the Temple</p>

            {% if error %}
            <div class="alert alert-danger py-2 text-start small font-monospace" role="alert">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                <div class="mb-3 text-start">
                    <label class="form-label text-muted small fw-bold">USERNAME</label>
                    <input type="text" class="form-control bg-dark text-white border-secondary" name="username" required>
                </div>

                <div class="mb-4 text-start">
                    <label class="form-label text-muted small fw-bold">PASSWORD</label>
                    <input type="password" class="form-control bg-dark text-white border-secondary" name="password" required>
                </div>

                <button type="submit" class="btn btn-light w-100 fw-bold fs-5 py-2 mb-3">LOGIN</button>
            </form>

            <div class="border-top border-secondary pt-3 mt-2">
                <a href="/register" class="text-secondary small text-decoration-none font-monospace">New here? <span class="text-white">Register Account</span></a>
            </div>

        </div>
    </div>

</body>
</html>
