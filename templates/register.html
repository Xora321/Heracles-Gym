<!DOCTYPE html>
<html data-bs-theme="dark">
<head>
    <title>Register - Gym Heracles</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #111111;
            background-image: url('/static/creation-bg.jpg');
            background-size: cover;
            background-position: center;
            background-blend-mode: overlay;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', serif;
            padding: 20px 0;
        }
        .auth-card {
            background-color: rgba(17, 17, 17, 0.85);
            backdrop-filter: blur(5px);
            border: 1px solid #444;
            width: 100%;
            max-width: 450px;
        }
        .form-control { font-family: -apple-system, sans-serif; }
    </style>
</head>
<body>

    <div class="card auth-card p-4 shadow-lg text-white">
        <div class="card-body">
            
            <h3 class="fw-bold mb-1 text-center">Join Heracles</h3>
            <p class="text-secondary mb-4 small text-center text-uppercase">Begin Your Journey</p>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">IC NUMBER (REQUIRED FOR PDPA)</label>
                    <input type="text" name="ic_number" class="form-control bg-dark text-white border-secondary" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">FULL NAME</label>
                    <input type="text" name="full_name" class="form-control bg-dark text-white border-secondary" required>
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">EMAIL</label>
                    <input type="email" name="email" class="form-control bg-dark text-white border-secondary" required>
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">PASSWORD</label>
                    <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required>
                </div>

                <button type="submit" class="btn btn-light w-100 fw-bold fs-5 py-2 mb-3">REGISTER</button>
            </form>

            <div class="border-top border-secondary pt-3 mt-2 text-center">
                <a href="/login" class="text-secondary small text-decoration-none font-monospace">Already a member? <span class="text-white">Login Here</span></a>
            </div>

        </div>
    </div>

</body>
</html>
